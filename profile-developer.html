<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者中心 - TechCraft</title>
    <meta name="description" content="TechCraft 开发者中心 - 管理您参与的任务、竞标和消息通知">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/profile.css?v=20260513-layout">

    <!-- Preload JS -->
    <link rel="modulepreload" href="assets/js/auth-state.js">
    <link rel="modulepreload" href="assets/js/auth-guard.js">
    <link rel="modulepreload" href="assets/js/shared-layout.js">
    <link rel="modulepreload" href="assets/js/profile-config.js">
    <link rel="modulepreload" href="assets/js/user-service.js">
    <link rel="modulepreload" href="assets/js/message-service.js">
    <link rel="modulepreload" href="assets/js/my-tasks-service.js">
</head>
<body>
    <!-- Navigation (由 shared-layout.js 渲染) -->
    <div data-layout="navbar"></div>

    <!-- Main Content -->
    <main class="profile-layout">
        <!-- Sidebar -->
        <aside class="profile-sidebar" id="profileSidebar">
            <!-- Profile Card (由 profile-header.js 渲染) -->
            <div id="profileCard"></div>

            <!-- Navigation Menu -->
            <nav class="profile-nav" id="profileNav">
                <button class="profile-nav-item active" data-section="overview">
                    <svg class="profile-nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    概览
                </button>
                <button class="profile-nav-item" data-section="my-participations">
                    <svg class="profile-nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    我参与的
                </button>
                <button class="profile-nav-item" data-section="messages">
                    <svg class="profile-nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    消息中心
                </button>
            </nav>

            <!-- Logout Button -->
            <button class="profile-logout" id="logoutBtn">
                <svg class="profile-nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                退出登录
            </button>
        </aside>

        <!-- Drawer Overlay (Mobile) -->
        <div class="profile-drawer-overlay" id="drawerOverlay"></div>

        <!-- Content Area -->
        <div class="profile-content">
            <!-- Overview Section -->
            <section id="section-overview" class="profile-section">
                <header class="profile-page-header">
                    <h1 class="profile-page-title">概览</h1>
                </header>

                <!-- Stats Cards -->
                <div class="profile-stats-grid" id="statsGrid"></div>

                <!-- Recent Participations -->
                <div class="profile-section-block">
                    <h2 class="profile-section-title">最近参与</h2>
                    <div id="recentTasks"></div>
                </div>

                <!-- Latest Messages -->
                <div class="profile-section-block">
                    <h2 class="profile-section-title">最新消息</h2>
                    <div id="latestMessages"></div>
                </div>
            </section>

            <!-- My Participations Section -->
            <section id="section-my-participations" class="profile-section profile-hidden">
                <header class="profile-page-header">
                    <h1 class="profile-page-title">我参与的</h1>
                </header>

                <!-- Tabs -->
                <div class="profile-tabs" id="taskTabs"></div>

                <!-- Task List -->
                <div class="profile-task-list" id="taskList"></div>
            </section>

            <!-- Messages Section -->
            <section id="section-messages" class="profile-section profile-hidden">
                <header class="profile-page-header">
                    <h1 class="profile-page-title">消息中心</h1>
                </header>

                <!-- Message Filter -->
                <div class="profile-tabs" id="messageFilter"></div>

                <!-- Message List -->
                <div class="profile-message-list" id="messageList"></div>
            </section>
        </div>
    </main>

    <!-- Footer (由 shared-layout.js 渲染) -->
    <div data-layout="footer"></div>

    <!-- Back to Top (由 shared-layout.js 渲染) -->
    <div data-layout="back-to-top"></div>

    <!-- Profile Editor Modal -->
    <div class="profile-modal-overlay" id="profileEditorModal">
        <div class="profile-modal">
            <div class="profile-modal-header">
                <h2 class="profile-modal-title">编辑资料</h2>
                <button class="profile-modal-close" id="closeModalBtn" aria-label="关闭">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="profile-modal-body">
                <form id="profileEditForm"></form>
            </div>
            <div class="profile-modal-footer">
                <button type="button" class="btn btn-secondary" id="cancelEditBtn">取消</button>
                <button type="submit" class="btn btn-primary" id="saveProfileBtn" form="profileEditForm">保存</button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="assets/js/task-runtime-repository.js"></script>
    <script type="module" src="assets/js/profile-developer-main.js"></script>
</body>
</html>
